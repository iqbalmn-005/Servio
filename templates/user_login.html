<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIO Service Providers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #F95C19;
            --bg-cream: #FFF1EB;
            --text-dark: #222124;
            --input-bg: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(249, 92, 25, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-text {
            color: var(--brand-orange);
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 1.5rem;
            display: block;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 2rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 5px;
            color: var(--text-dark);
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            box-sizing: border-box;
            background: var(--input-bg);
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--brand-orange);
        }

        .btn-auth {
            width: 100%;
            background-color: var(--brand-orange);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-auth:hover {
            background-color: #e24d10;
            transform: translateY(-2px);
        }

        .footer-link {
            margin-top: 1.5rem;
            font-size: 14px;
            color: #666;
        }

        .footer-link a {
            color: var(--brand-orange);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
    </head>
    <body>
    <div class="auth-card">
        <span class="logo-text">Quriarbox</span>
        <h2>Customer Login</h2>
        <p class="subtitle">Enter your details to access your requests</p>
        
        {% if error %}
        <div style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 1rem; border: 1px solid #f5c6cb;">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action=""> 
            {% csrf_token %} 
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="name@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-auth">Login as Customer</button>
        </form>
        
        <p class="footer-link">New here? <a href="{% url 'user_registration' %}">Create Customer Account</a></p>
    </div>
</body>
</html>
