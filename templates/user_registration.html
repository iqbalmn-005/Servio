<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIO Service Providers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-orange: #F95C19;
            --bg-cream: #FFF1EB;
            --text-dark: #222124;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .registration-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }

        .logo {
            color: var(--brand-orange);
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
            display: block;
        }

        h2 {
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #4A5568;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            box-sizing: border-box;
            background: #FAFAFA;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--brand-orange);
        }

        textarea.form-control {
            resize: vertical;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--brand-orange);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #d84a12;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .footer-text a {
            color: var(--brand-orange);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="registration-card">
        <span class="logo">Quriarbox</span>
        <h2>User Registration</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="Name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" name="phone_number" class="form-control" >
                </div>

                <div class="form-group full-width">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" >
                </div>

                <div class="form-group full-width">
                    <label>Address</label>
                    <textarea name="address" class="form-control" rows="2"></textarea>
                </div>



                <div class="form-group full-width">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Register Now</button>
        </form>
        {% if  error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <p class="footer-text">Already have an account? <a href="{% url 'user_login' %}">Login</a></p>
    </div>

</body>
</html>
