<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIO Service Providers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reuse the CSS from the User Registration page for a consistent brand look */
        :root {
            --brand-orange: #F95C19;
            --bg-cream: #FFF1EB;
            --text-dark: #222124;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            color: var(--brand-orange);
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            display: block;
        }

        h2 {
            text-align: center;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--brand-orange);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background-color: #d84a12;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .footer-text a {
            color: var(--brand-orange);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <span class="logo">Quriarbox</span>
        <h2>Provider Login</h2>
        <p class="subtitle">Access your expert dashboard</p>
        
        {% if messages %}
        <div style="margin-bottom: 1rem;">
            {% for message in messages %}
            <div style="background-color: #d4edda; color: #155724; padding: 10px; border-radius: 5px; border: 1px solid #c3e6cb;">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% if error %}
        <div style="background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 1rem; border: 1px solid #f5c6cb;">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="" method="POST">
            {% csrf_token %}
            <div class="form-group">    
                <label>Provider ID / Email</label>
                <input type="text" name="email" class="form-control" required placeholder="">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Login as Provider</button>
        </form>
        <p class="footer-text">Become a partner? <a href="{% url 'provider_registration' %}">Register here</a></p>
    </div>
</body>
</html>
